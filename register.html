<!DOCTYPE html>
<html>
<head>
    <title>Register Event</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>Register for Event ✨</h2>

    <input id="name" placeholder="Student Name" readonly>
    <input id="rollno" placeholder="Roll No" readonly>
    <input id="email" placeholder="Email" readonly>

    <input id="dept" placeholder="Department">

    <button onclick="registerEvent()">Submit</button>

    <p id="msg"></p>
</div>

<script src="script.js"></script>

<script>
window.onload = function () {
    document.getElementById("name").value = localStorage.getItem("name") || "";
    document.getElementById("rollno").value = localStorage.getItem("rollno") || "";
    document.getElementById("email").value = localStorage.getItem("email") || "";
};
</script>

</body>
</html>
